<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BLLRS Wellness — IG post</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0E1714;
  --text: #FFFFFF;
  --muted: #B5B9B6;
  --dim: #6E7472;
  --accent: #22C55E;
  --line: rgba(255,255,255,0.18);
  --line-soft: rgba(255,255,255,0.1);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: #1a1a1a; font-family: 'Inter', sans-serif; color: var(--text); -webkit-font-smoothing: antialiased; }

.post {
  width: 1080px;
  height: 1350px;
  background: var(--bg);
  position: relative;
  overflow: hidden;
  margin: 0 auto;
}
.post-bg {
  position: absolute; inset: 0;
  background-image: url('../assets/wellness-bg.jpg');
  background-size: cover; background-position: center;
  opacity: 0.62;
  filter: contrast(1.05) brightness(0.95);
}
.post-bg::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(180deg, rgba(14,23,20,0.35) 0%, rgba(14,23,20,0.45) 45%, rgba(14,23,20,0.78) 100%);
}
.post-content {
  position: relative; z-index: 2;
  width: 100%; height: 100%;
  padding: 90px 90px 70px;
  display: flex; flex-direction: column;
}

/* Title block */
.title-block { text-align: center; margin-bottom: 56px; }
.t-logo {
  font-family: 'Bebas Neue', sans-serif; font-size: 132px;
  letter-spacing: -0.005em; line-height: 0.85; color: var(--text);
}
.t-sub {
  font-family: 'Inter', sans-serif; font-size: 22px; font-weight: 500;
  letter-spacing: 0.42em; color: var(--text); margin-top: 14px;
}
.t-divider {
  width: 56px; height: 1px; background: var(--accent);
  margin: 22px auto 0;
}

/* Services list */
.services {
  display: flex; flex-direction: column; gap: 14px;
  margin-bottom: 64px;
  padding: 0 14px;
}
.svc-row {
  display: flex; align-items: center; gap: 18px;
  font-family: 'Inter', sans-serif; font-style: italic;
  font-size: 22px; letter-spacing: 0.16em; color: var(--text); font-weight: 500;
  text-transform: uppercase;
}
.svc-row .colon { color: var(--accent); font-style: normal; font-weight: 700; font-size: 26px; line-height: 1; }
.svc-row.free::after {
  content: 'FREE'; font-style: normal; font-size: 11px; letter-spacing: 0.25em;
  color: var(--accent); padding: 4px 10px; border: 1px solid var(--accent); margin-left: auto;
}

/* Price + spots block */
.deal-block { text-align: center; margin-bottom: 36px; }
.spots { font-size: 18px; letter-spacing: 0.32em; color: var(--text); font-weight: 500; margin-bottom: 16px; }
.spots strong { color: var(--accent); font-weight: 700; }
.price {
  font-family: 'Bebas Neue', sans-serif; font-size: 110px;
  letter-spacing: -0.005em; line-height: 0.9; color: var(--accent);
}
.price .cur { font-size: 38px; vertical-align: top; margin-right: 8px; color: var(--muted); font-family: 'Inter'; font-weight: 300; }
.price .unit { font-size: 32px; letter-spacing: 0.2em; color: var(--muted); margin-left: 6px; font-family: 'Inter'; font-weight: 400; }

/* Booking line */
.booking {
  text-align: center; margin-bottom: 48px;
  font-family: 'Inter', sans-serif; font-style: italic; font-size: 20px;
  color: var(--text); font-weight: 500;
}
.booking strong { color: var(--accent); font-style: normal; font-weight: 700; letter-spacing: 0.05em; }

/* Photo strip */
.photos {
  display: grid; grid-template-columns: 1fr 1fr; gap: 22px;
  margin-bottom: 30px;
}
.photo-tile {
  aspect-ratio: 1/1;
  border-radius: 24px;
  background-size: cover; background-position: center;
  border: 1.5px solid var(--line);
  position: relative; overflow: hidden;
}
.photo-tile.p1 { background-image: url('../assets/wellness-photo1.jpg'); }
.photo-tile.p2 { background-image: url('../assets/wellness-photo2.jpg'); }
.photo-tile::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(180deg, transparent 65%, rgba(0,0,0,0.25));
}

/* Footer */
.footer {
  text-align: center; margin-top: auto;
  display: flex; flex-direction: column; align-items: center; gap: 10px;
}
.footer .marker { width: 8px; height: 8px; background: var(--accent); }
.footer .city {
  font-family: 'Bebas Neue', sans-serif; font-size: 22px;
  letter-spacing: 0.22em; color: var(--text);
}
.footer .sub {
  font-size: 11px; letter-spacing: 0.34em; color: var(--muted);
}
</style>
</head>
<body>

<div class="post">
  <div class="post-bg"></div>
  <div class="post-content">

    <div class="title-block">
      <div class="t-logo">BLLRS.</div>
      <div class="t-sub">WELLNESS</div>
      <div class="t-divider"></div>
    </div>

    <div class="services">
      <div class="svc-row"><span class="colon">:</span><span>Mat Pilates Flow</span></div>
      <div class="svc-row free"><span class="colon">:</span><span>Ginger Shot · Vegain Wellness Bar</span></div>
      <div class="svc-row"><span class="colon">:</span><span>Ice Bath Session for Recovery</span></div>
    </div>

    <div class="deal-block">
      <div class="spots">ONLY <strong>6 SPOTS</strong></div>
      <div class="price"><span class="cur">฿</span>750<span class="unit">THB</span></div>
    </div>

    <div class="booking">
      Book via Line — <strong>@ballersbangkok</strong>
    </div>

    <div class="photos">
      <div class="photo-tile p1"></div>
      <div class="photo-tile p2"></div>
    </div>

    <div class="footer">
      <div class="marker"></div>
      <div class="city">BANGKOK · THAILAND</div>
      <div class="sub">BALLERS BANGKOK PERFORMANCE CENTER</div>
    </div>
  </div>
</div>

</body>
</html>
